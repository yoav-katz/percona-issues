# ==========================================
# BACKUPS (pgBackRest)
# ==========================================
backups:
  enabled: true
  
  # Local PVC Backup (Always runs if backups are enabled)
  local:
    schedules:
      full: "0 10 * * *"
      
  # Remote S3 Backup (e.g., StorageGRID or AWS S3)
  s3:
    enabled: false
    user: "XXXX"
    secret: "YYYYY"
    schedules:
      full: "0 12 * * 0"
      differential: "0 12 * * 1-6"
    endpoint: "storage.med.one"
    region: "US"


