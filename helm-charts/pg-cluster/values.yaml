# ==========================================
# PERCONA POSTGRESQL CLUSTER CONFIGURATION
# ==========================================

finalizers:
# Set this if you want that operator deletes the PVCs on cluster deletion
  - percona.com/delete-pvc
# Set this if you want that operator deletes the ssl objects on cluster deletion
  - percona.com/delete-ssl
# Set this if you want that operator deletes the backups on cluster deletion
  - percona.com/delete-backups


# -- The exact image tag to deploy. The chart automatically parses the major version from this string.
postgresVersion: "16.11-2"
forceZone: "az-b"
# -- Set to true to pause the operator from reconciling this cluster (useful during manual maintenance)
pause: false

# -- Set to true to stop the operator from managing the cluster completely
unmanaged: false


# ==========================================
# TOPOLOGY & RESOURCES
# ==========================================

# -- Number of database nodes. 
# 1 = Single-node (disables synchronous commit & HA logic)
# 3 = High Availability (distributes across az-a, az-b, az-c and enables strict sync)
replicaCount: 3

# -- Storage size for the primary data volume (PVC) per node
dbStorage: "5Gi"

# -- Compute resources assigned to each database node
dbResources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"


